<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Gallery</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #4a8fbf;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; min-height: 100vh; }

    /* ── Loading splash ── */
    #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 20px; padding: 40px; text-align: center; }
    #loader h1 { font-size: 28px; }
    #loader > p { color: var(--muted); max-width: 420px; line-height: 1.6; }
    #loader small { color: var(--muted); font-size: 11px; }
    #drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 44px 60px; cursor: pointer; transition: border-color .15s, background .15s; width: 100%; max-width: 460px; }
    #drop-zone:hover, #drop-zone.over { border-color: var(--accent); background: rgba(74,143,191,.06); }
    #drop-zone .icon { font-size: 44px; margin-bottom: 8px; }
    #drop-zone p { color: var(--muted); font-size: 14px; }
    #drop-zone strong { color: var(--text); }
    .btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 9px 22px; font-size: 14px; cursor: pointer; margin-top: 10px; }
    .btn:hover { filter: brightness(1.15); }
    #file-input { display: none; }
    #load-err { color: #f87171; display: none; font-size: 13px; }
    #spin { font-size: 32px; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── App ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; flex-direction: column; gap: 6px; }
    .header-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #title { font-size: 15px; font-weight: 700; white-space: nowrap; }
    #subtitle { font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 6px; }
    #search { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 13px; width: 200px; outline: none; }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }
    #source-filters { display: flex; gap: 4px; }
    .pill { background: transparent; border: 1px solid var(--border); border-radius: 20px; color: var(--muted); padding: 4px 11px; font-size: 12px; cursor: pointer; transition: all .12s; }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .pill.slack.active  { background: #6a3a8a; border-color: #6a3a8a; }
    .pill.notion.active { background: #444;    border-color: #666; }
    .pill.cat-ctrl.active { background: #555; border-color: #777; color: #fff; }
    #uploader { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 10px; font-size: 12px; outline: none; max-width: 180px; display: none; }
    #cat-filters { display: none; flex-wrap: wrap; gap: 5px; align-items: center; padding-top: 2px; border-top: 1px solid var(--border); }
    #size-slider { width: 240px; accent-color: var(--accent); cursor: pointer; }
    #count { color: var(--muted); font-size: 12px; margin-left: auto; white-space: nowrap; }
    .gif-badge { font-size: 8px; background: rgba(255,140,0,.2); color: #f90; border: 1px solid rgba(255,140,0,.4); border-radius: 3px; padding: 0 3px; line-height: 1.5; flex-shrink: 0; align-self: center; }

    /* ── Grid ── */
    #grid { padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; }

    /* Card: image fills full width, name is a small caption below */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 4px 4px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer;
      transition: border-color .12s, background .12s;
      overflow: hidden; min-width: 0;
    }
    .card:hover  { border-color: var(--accent); background: #1c2333; }
    .card.copied { border-color: #4caf50 !important; background: rgba(76,175,80,.1) !important; }
    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border-radius: 3px;
      display: block;
    }
    .card-name {
      font-size: 8px;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
      line-height: 1.2;
    }
    /* ── Cap / empty ── */
    #cap-notice { text-align: center; color: var(--muted); font-size: 11px; padding: 6px; display: none; }
    #empty { display: none; text-align: center; color: var(--muted); padding: 80px 20px; font-size: 15px; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px); background: #2d3748; color: #e2e8f0; padding: 8px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="loader">
  <h1>Emoji Gallery</h1>
  <p id="loader-msg">Choose your JSON files to get started.</p>
  <div id="drop-zone" tabindex="0">
    <div class="icon">📂</div>
    <p>Drop <strong>slack-emojis-*.json</strong> and <strong>slack-emojis-tags.json</strong> here<br>or click to browse — select both files at once (Cmd+click)</p>
    <button class="btn" id="browse-btn">Choose files</button>
  </div>
  <p id="load-err"></p>
</div>
<input type="file" id="file-input" accept=".json" multiple>

<div id="app">
  <header>
    <div class="header-row">
      <span id="title">Emoji Gallery<span id="subtitle"></span></span>
      <input id="search" type="search" placeholder="Search emojis…" autocomplete="off">
      <input id="size-slider" type="range" min="32" max="200" value="80" title="Card size">
      <select id="uploader"><option value="">All uploaders</option></select>
      <span id="count"></span>
    </div>
    <div id="cat-filters"></div>
    <button class="pill" id="gif-toggle" style="display:none">GIF</button>
  </header>
  <div id="grid"></div>
  <div id="cap-notice"></div>
  <div id="empty">No emojis match your filters.</div>
</div>

<div id="toast"></div>

<script>
(function () {
  'use strict';

  var BATCH_SIZE = 300;   // cards appended per scroll load

  // ── State ────────────────────────────────────────────────────────────────

  var data = [];
  var uploaderFilter = '';
  var allCats = [];
  var categoryFilter = '';
  var gifOnly = false;
  var searchQuery = '';
  var searchTimer = null;
  var currentMatches = [];
  var renderOffset = 0;

  // ── Startup ───────────────────────────────────────────────────────────────
  if (window.EMOJI_DATA) {
    data = window.EMOJI_DATA;
    data.forEach(function (e) { e.animated = /\.gif($|\?)/i.test(e.imageUrl || ''); });
    init();
  } else {
    wireDropZone();
  }

  function mergeTags(tagsMap) {
    data.forEach(function (e) {
      var t = tagsMap[e.name];
      if (!t) return;
      if (t.category) e.category = t.category;
      if (t.tags)     e.tags     = t.tags;
      if (t.animated !== undefined) e.animated = t.animated;
    });
  }

  // ── Manual file loading (fallback) ───────────────────────────────────────

  function wireDropZone() {
    var fileInput = document.getElementById('file-input');
    var dropZone  = document.getElementById('drop-zone');
    document.getElementById('browse-btn').addEventListener('click', function (e) { e.stopPropagation(); fileInput.click(); });
    dropZone.addEventListener('click', function () { fileInput.click(); });
    dropZone.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
    fileInput.addEventListener('change', function (e) { loadFiles(Array.from(e.target.files)); e.target.value = ''; });
    dropZone.addEventListener('dragover',  function (e) { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', function ()  { dropZone.classList.remove('over'); });
    dropZone.addEventListener('drop', function (e) {
      e.preventDefault(); dropZone.classList.remove('over');
      loadFiles(Array.from(e.dataTransfer.files).filter(function (f) { return f.name.endsWith('.json'); }));
    });
  }

  function loadFiles(files) {
    var errEl = document.getElementById('load-err');
    errEl.style.display = 'none';
    if (!files.length) return;
    Promise.all(files.map(function (f) { return f.text().then(function (txt) { return { name: f.name, json: JSON.parse(txt) }; }); }))
      .then(function (results) {
        var tags = null;
        var emojiSets = [];
        results.forEach(function (r) {
          if (r.name === 'slack-emojis-tags.json') {
            tags = r.json;
          } else {
            emojiSets.push(r.json);
          }
        });
        data = [].concat.apply([], emojiSets);
        if (!data.length) throw new Error('No emoji entries found. Make sure you include slack-emojis-*.json.');
        data.forEach(function (e) { e.animated = /\.gif($|\?)/i.test(e.imageUrl || ''); });
        if (tags) mergeTags(tags);
        init();
      })
      .catch(function (e) { errEl.textContent = 'Error: ' + e.message; errEl.style.display = ''; });
  }

  // ── Init ─────────────────────────────────────────────────────────────────

  function init() {
    document.getElementById('subtitle').textContent = ' · ' + data.length.toLocaleString() + ' emojis';

    buildCategoryChips();
    buildUploaderDropdown();
    applyFilters();

    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  }

  // ── Category chips (single-select tabs) ──────────────────────────────────

  function buildCategoryChips() {
    var cats = data.map(function (e) { return e.category || ''; }).filter(Boolean);
    allCats = cats.filter(function (c, i, a) { return a.indexOf(c) === i; }).sort();
    if (!allCats.length) return;

    var container = document.getElementById('cat-filters');
    container.innerHTML = '';

    var gifBtn = document.getElementById('gif-toggle');
    gifBtn.style.display = '';
    container.appendChild(gifBtn);

    var sep = document.createElement('span');
    sep.style.cssText = 'width:1px;background:var(--border);align-self:stretch;margin:0 2px';
    container.appendChild(sep);

    var allBtn = document.createElement('button');
    allBtn.className = 'pill cat-chip active';
    allBtn.dataset.cat = '';
    allBtn.textContent = 'All';
    container.appendChild(allBtn);

    allCats.forEach(function (cat) {
      var btn = document.createElement('button');
      btn.className = 'pill cat-chip';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      container.appendChild(btn);
    });

    container.addEventListener('click', function (e) {
      var btn = e.target.closest('.cat-chip');
      if (!btn) return;
      categoryFilter = btn.dataset.cat;
      container.querySelectorAll('.cat-chip').forEach(function (b) { b.classList.toggle('active', b === btn); });
      applyFilters();
    });

    container.style.display = 'flex';
  }

  // ── Uploader dropdown ─────────────────────────────────────────────────────

  function buildUploaderDropdown() {
    var uploaders = data.map(function (e) { return e.addedBy || ''; }).filter(Boolean);
    var unique = uploaders.filter(function (u, i, a) { return a.indexOf(u) === i; }).sort(function (a, b) { return a.localeCompare(b); });
    var sel = document.getElementById('uploader');
    while (sel.options.length > 1) sel.remove(1);
    unique.forEach(function (u) { var o = document.createElement('option'); o.value = u; o.textContent = u; sel.appendChild(o); });
    sel.style.display = unique.length ? '' : 'none';
  }

  // ── Filter + render ───────────────────────────────────────────────────────

  function applyFilters() {
    currentMatches = data.filter(function (e) {
      if (uploaderFilter && (e.addedBy || '') !== uploaderFilter) return false;
      if (categoryFilter && (e.category || '') !== categoryFilter) return false;
      if (gifOnly && !/\.gif($|\?)/i.test(e.imageUrl || '')) return false;
      if (searchQuery) {
        var nameMatch = (e.name || '').toLowerCase().indexOf(searchQuery) !== -1;
        var tagMatch  = Array.isArray(e.tags) && e.tags.some(function (t) { return t.indexOf(searchQuery) !== -1; });
        if (!nameMatch && !tagMatch) return false;
      }
      return true;
    });
    renderOffset = 0;
    document.getElementById('grid').innerHTML = '';
    appendBatch();
    updateCount();
    document.getElementById('empty').style.display = currentMatches.length === 0 ? 'block' : 'none';
  }

  function appendBatch() {
    if (renderOffset >= currentMatches.length) return;
    var batch = currentMatches.slice(renderOffset, renderOffset + BATCH_SIZE);
    var grid = document.getElementById('grid');
    var frag = document.createDocumentFragment();
    batch.forEach(function (e) {
      var card = document.createElement('div');
      card.className = 'card';
      var tip = ':' + e.name + ':';
      if (e.category) tip += '\n'    + e.category + (e.tags && e.tags.length ? ' · ' + e.tags.join(', ') : '');
      if (e.addedBy)  tip += '\nBy ' + e.addedBy;
      if (e.dateAdded)tip += '\n'    + e.dateAdded;
      card.title = tip;

      var img = document.createElement('img');
      img.src = e.imageUrl || '';
      img.alt = e.name || '';
      img.loading = 'lazy';
      img.addEventListener('error', function () {
        if (e.imageUrlRaw && img.src !== e.imageUrlRaw) img.src = e.imageUrlRaw;
        else img.style.visibility = 'hidden';
      });

      var nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.textContent = e.name || '';

      card.appendChild(img);
      card.appendChild(nameEl);
      card.addEventListener('click', function () {
        var text = ':' + e.name + ':';
        navigator.clipboard.writeText(text).then(function () {
          card.classList.add('copied');
          setTimeout(function () { card.classList.remove('copied'); }, 700);
          toast('Copied ' + text);
        });
      });
      frag.appendChild(card);
    });
    grid.appendChild(frag);
    renderOffset += batch.length;
    updateCount();
  }

  function updateCount() {
    var shown = Math.min(renderOffset, currentMatches.length);
    var total = currentMatches.length;
    var countEl = document.getElementById('count');
    var cap = document.getElementById('cap-notice');
    countEl.textContent = total.toLocaleString() + (total !== data.length ? ' matching' : ' emojis');
    if (shown < total) {
      cap.textContent = 'Showing ' + shown.toLocaleString() + ' of ' + total.toLocaleString() + ' — scroll for more';
      cap.style.display = '';
    } else {
      cap.style.display = 'none';
    }
  }

  // Infinite scroll — append next batch when within 600px of page bottom
  window.addEventListener('scroll', function () {
    if (renderOffset >= currentMatches.length) return;
    if (window.scrollY + window.innerHeight > document.documentElement.scrollHeight - 600) {
      appendBatch();
    }
  }, { passive: true });

  // ── Controls ──────────────────────────────────────────────────────────────

  document.getElementById('search').addEventListener('input', function (e) {
    clearTimeout(searchTimer);
    var v = e.target.value.toLowerCase().trim();
    searchTimer = setTimeout(function () { searchQuery = v; applyFilters(); }, 150);
  });

  document.getElementById('uploader').addEventListener('change', function (e) {
    uploaderFilter = e.target.value;
    applyFilters();
  });

  document.getElementById('size-slider').addEventListener('input', function () {
    document.getElementById('grid').style.gridTemplateColumns = 'repeat(auto-fill, minmax(' + this.value + 'px, 1fr))';
  });

  document.getElementById('gif-toggle').addEventListener('click', function () {
    gifOnly = !gifOnly;
    this.classList.toggle('active', gifOnly);
    applyFilters();
  });

  // ── Toast ─────────────────────────────────────────────────────────────────

  var toastEl = document.getElementById('toast');
  var toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 1400);
  }

})();
</script>
</body>
</html>
